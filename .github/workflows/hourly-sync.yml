name: Hourly Data Sync

on:
  schedule:
    - cron: '0 * * * *' # Every hour
  workflow_dispatch: # Allows manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Important for pushing data.json back
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Latest LTS
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Pre-sync Health Check
        run: |
          echo "Verificando variáveis de ambiente..."
          if [ -z "${{ secrets.JIRA_BASE_URL }}" ]; then echo "❌ JIRA_BASE_URL is MISSING"; exit 1; fi
          if [ -z "${{ secrets.JIRA_USER_EMAIL }}" ]; then echo "❌ JIRA_USER_EMAIL is MISSING"; exit 1; fi
          if [ -z "${{ secrets.JIRA_API_TOKEN }}" ]; then echo "❌ JIRA_API_TOKEN is MISSING"; exit 1; fi
          echo "✅ Todos os Secrets estão presentes."

      - name: Run Jira Sync
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: npm run sync:jira

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add src/data.json
          
          # Check if there are changes before committing
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes in data.json. Skipping commit."
          else
            git commit -m "chore: automated hourly sync [skip ci]"
            git push origin main || git push
          fi
