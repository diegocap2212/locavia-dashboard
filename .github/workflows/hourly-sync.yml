name: Hourly Data Sync

on:
  schedule:
    # A cada 30 min. Crons agendados do GitHub são best-effort (atrasam/pulam sob carga),
    # então rodamos com folga; o header do painel ainda alerta se os dados ficarem velhos.
    - cron: '*/30 * * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Important for pushing data.json back
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Clear Node 20 deprecation warnings
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for pushing
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Latest LTS
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Pre-sync Health Check
        run: |
          echo "Verificando variáveis de ambiente Jira..."
          if [ -z "${{ secrets.JIRA_BASE_URL }}" ]; then echo "❌ JIRA_BASE_URL is MISSING"; exit 1; fi
          if [ -z "${{ secrets.JIRA_USER_EMAIL }}" ]; then echo "❌ JIRA_USER_EMAIL is MISSING"; exit 1; fi
          if [ -z "${{ secrets.JIRA_API_TOKEN }}" ]; then echo "❌ JIRA_API_TOKEN is MISSING"; exit 1; fi
          echo "✅ Todos os Secrets do Jira estão presentes."

      - name: Run Jira Sync
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          npm run sync:jira
          npm run sync:sfmkt
          # Verificação rigorosa de tamanho (mínimo 10KB para Locavia/BF-CEM e 1KB para SFMKT)
          FILE_SIZE=$(wc -c < src/data.json)
          echo "Tamanho do src/data.json: $FILE_SIZE bytes"
          if [ "$FILE_SIZE" -lt 10000 ]; then
            echo "❌ ERRO: src/data.json é muito pequeno ($FILE_SIZE bytes). Sincronização possivelmente falhou."
            exit 1
          fi

          SFMKT_SIZE=$(wc -c < sfmkt_data.json)
          echo "Tamanho do sfmkt_data.json: $SFMKT_SIZE bytes"
          if [ "$SFMKT_SIZE" -lt 1000 ]; then
            echo "❌ ERRO: sfmkt_data.json é muito pequeno ($SFMKT_SIZE bytes). Sincronização SFMKT possivelmente falhou."
            exit 1
          fi

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add src/data.json sfmkt_data.json src/data-meta.json
          
          # Check if there are changes before committing
          if git diff --quiet && git diff --staged --quiet; then
            echo "Sem alterações nos arquivos de dados. Ignorando commit."
          else
            # SEM [skip ci]: o SMDashboard lê o data.json embutido no build, então
            # cada sync com dado novo precisa disparar um deploy na Vercel para o
            # painel em produção refletir os itens atualizados. O guard acima garante
            # que só commitamos (e portanto só deployamos) quando os dados mudaram.
            git commit -m "chore: automated hourly sync"
            git push origin main
          fi
